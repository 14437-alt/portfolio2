<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ประวัติส่วนตัว</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Tahoma",sans-serif;
}

body{
    background:linear-gradient(135deg,#b8fff5,#9ef7d8,#d8fff8);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

.card{
    width:380px;
    background:rgba(255,255,255,0.9);
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    animation:fadeIn 1s;
}

.profile{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #00b894;
    box-shadow:0 0 20px rgba(0,0,0,.3);
    margin-bottom:20px;
}

h1{
    color:#00897b;
    margin-bottom:20px;
}

.info{
    text-align:left;
    font-size:18px;
    line-height:2;
    color:#333;
}

.info b{
    color:#00695c;
}

.back{
    display:inline-block;
    margin-top:25px;
    padding:12px 25px;
    background:#00b894;
    color:white;
    text-decoration:none;
    border-radius:30px;
    transition:.3s;
}

.back:hover{
    background:#00997a;
    transform:scale(1.05);
}

.leaf{
    position:fixed;
    top:-50px;
    font-size:28px;
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-50px) rotate(0deg);
    }
    to{
        transform:translateY(110vh) translateX(120px) rotate(360deg);
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

</head>
<body>

<div class="card">

<img src="IMG_4996.png" alt="รูปโปรไฟล์" class="profile">

<h1>👤 ประวัติส่วนตัว</h1>

<div class="info">
<b>ชื่อ-นามสกุล :</b> จิรชัย โนนศรีลาด<br>
<b>ชื่อเล่น :</b> ฮาร์ท<br>
<b>ชั้น :</b> ม.6/5<br>
<b>สถานศึกษา :</b> โรงเรียนพานทอง จังหวัดชลบุรี<br>
<b>แผนการเรียน :</b> ศิลป์-ทั่วไป
</div>

<a href="index.html" class="back">🏠 กลับหน้าหลัก</a>

</div>

<script>
function leaf(){
    let l=document.createElement("div");
    l.className="leaf";
    l.innerHTML=["🍃","🍂","🌿"][Math.floor(Math.random()*3)];
    l.style.left=Math.random()*100+"vw";
    l.style.animationDuration=(5+Math.random()*5)+"s";
    l.style.fontSize=(20+Math.random()*15)+"px";
    document.body.appendChild(l);
    setTimeout(()=>l.remove(),10000);
}
setInterval(leaf,300);
</script>

</body>
</html>
