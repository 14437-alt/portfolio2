<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Portfolio นายจิรชัย</title>

<style>
body{
    margin:0;
    font-family:Tahoma, sans-serif;
    background:#98FFCC; /* สีมิ้น */
    overflow:hidden;
}

/* กล่องเนื้อหา */
.container{
    width:450px;
    margin:80px auto;
    text-align:center;
    background:rgba(255,255,255,0.8);
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
    position:relative;
    z-index:10;
}

h1{
    color:#006666;
}

/* ปุ่มเมนู */
a{
    display:block;
    text-decoration:none;
    background:#00CC99;
    color:white;
    padding:15px;
    margin:15px;
    border-radius:12px;
    font-size:20px;
    transition:0.3s;
}

a:hover{
    background:#009966;
    transform:scale(1.05);
}

/* ใบไม้ */
.leaf{
    position:fixed;
    top:-50px;
    font-size:25px;
    animation:fall linear infinite;
}

@keyframes fall{
    0%{
        transform:translateY(-50px) rotate(0deg);
    }
    100%{
        transform:translateY(110vh) rotate(360deg);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🌿 Portfolio นายจิรชัย 🌿</h1>

    <a href="profile.html">👤 ประวัติส่วนตัว</a>
    <a href="activity.html">🎉 กิจกรรม</a>
    <a href="education.html">🎓 ประวัติการศึกษา</a>
    <a href="contact.html">📞 ช่องทางการติดต่อ</a>
</div>

<script>
for(let i=0;i<40;i++){
    let leaf=document.createElement("div");
    leaf.className="leaf";
    leaf.innerHTML="🍃";
    leaf.style.left=Math.random()*100+"vw";
    leaf.style.animationDuration=(5+Math.random()*8)+"s";
    leaf.style.animationDelay=Math.random()*5+"s";
    leaf.style.fontSize=(20+Math.random()*20)+"px";
    document.body.appendChild(leaf);
}
</script>

</body>
</html>
